name: bestIp

on:
  push:
  schedule:
    - cron: '0 */1 * * *'   # 每小时运行一次（cron 格式：每3小时应为 '0 */3 * * *'）
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Run script and save output
        run: python bestIp.py > bestIp.txt

      - name: Commit result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bestIp.txt
          git commit -m "Auto update bestIp.txt [skip ci]" || echo "No changes to commit"
          git push